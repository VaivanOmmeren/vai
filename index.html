<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown to 27 February, 11:00</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #f3e8ff);
      overflow: hidden;
      position: relative;
    }

    /* Sparkle background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: radial-gradient(white 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.2;
      animation: sparkleMove 60s linear infinite;
    }

    @keyframes sparkleMove {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    .container {
      position: relative;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      padding: 70px 90px;
      border-radius: 40px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(214, 150, 255, 0.25);
      animation: fadeIn 1.5s ease-in-out;
    }

    /* Glowing animated border */
    .container::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 45px;
      background: linear-gradient(45deg, #ffb6e6, #d6b3ff, #ffd6f5);
      z-index: -1;
      filter: blur(12px);
      animation: glowRotate 6s linear infinite;
    }

    @keyframes glowRotate {
      0% { filter: blur(12px) hue-rotate(0deg); }
      100% { filter: blur(12px) hue-rotate(360deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4em;
      color: #b65fcf;
      margin-bottom: 45px;
      letter-spacing: 1px;
    }

    .countdown-wrapper {
      display: flex;
      gap: 25px;
      justify-content: center;
    }

    .time-box {
      background: white;
      padding: 25px 30px;
      border-radius: 22px;
      min-width: 100px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .number {
      font-size: 2.3em;
      font-weight: 500;
      color: #d16ba5;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .number.animate {
      transform: translateY(-5px);
      opacity: 0.6;
    }

    .label {
      font-size: 0.8em;
      margin-top: 6px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Countdown to 27 February, 11:00</h1>

    <div class="countdown-wrapper">
      <div class="time-box">
        <div id="days" class="number">0</div>
        <div class="label">Days</div>
      </div>

      <div class="time-box">
        <div id="hours" class="number">0</div>
        <div class="label">Hours</div>
      </div>

      <div class="time-box">
        <div id="minutes" class="number">0</div>
        <div class="label">Minutes</div>
      </div>

      <div class="time-box">
        <div id="seconds" class="number">0</div>
        <div class="label">Seconds</div>
      </div>
    </div>
  </div>

  <script>
    var targetDate = new Date(2026, 1, 27, 11, 0, 0);

    function animateChange(element, value) {
      if (element.innerHTML != value) {
        element.classList.add("animate");
        setTimeout(function() {
          element.innerHTML = value;
          element.classList.remove("animate");
        }, 150);
      }
    }

    function updateCountdown() {
      var now = new Date().getTime();
      var diff = targetDate.getTime() - now;

      if (diff <= 0) {
        document.querySelector(".container").innerHTML =
          "<h1>💖 The Moment Has Arrived 💖</h1>";
        clearInterval(timer);
        return;
      }

      var days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      var hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((diff % (1000 * 60)) / 1000);

      animateChange(document.getElementById("days"), days);
      animateChange(document.getElementById("hours"), hours);
      animateChange(document.getElementById("minutes"), minutes);
      animateChange(document.getElementById("seconds"), seconds);
    }

    var timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
