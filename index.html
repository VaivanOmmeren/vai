<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown to 27 February, 11:00</title>
</head>
<body>
  <h1>Countdown to 27 February, 11:00</h1>
  <div id="countdown">Calculating…</div>

  <script>
    // year, month(0=Jan,1=Feb), day, hour, minute, second
    var targetDate = new Date(2026, 1, 27, 11, 0, 0);

    function updateCountdown() {
      var now = new Date().getTime();
      var diff = targetDate.getTime() - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "Time reached!";
        clearInterval(timer);
        return;
      }

      var days    = Math.floor(diff / (1000 * 60 * 60 * 24));
      var hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s";
    }

    var timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
